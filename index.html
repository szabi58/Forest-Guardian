
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forest Guardian</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body, html, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #1a1a1a;
      }
      /* Disable selection for game feel */
      canvas {
        outline: none;
        user-select: none;
      }

      /* Pixel-art Dialogue Bubble Styles */
      .npc-dialogue-container {
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 280px;
        transform: translateY(-20px);
      }

      .npc-dialogue-bubble {
        background: white;
        border: 4px solid #000;
        padding: 12px;
        color: #000;
        font-family: 'Press Start 2P', cursive;
        font-size: 10px;
        line-height: 1.6;
        text-align: center;
        box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
        position: relative;
        width: 100%;
      }

      .npc-dialogue-bubble::after {
        content: '';
        position: absolute;
        bottom: -16px;
        left: 50%;
        transform: translateX(-50%);
        border-width: 12px 12px 0;
        border-style: solid;
        border-color: #000 transparent transparent;
      }

      .npc-name-tag {
        background: #000;
        color: #fff;
        font-family: 'Press Start 2P', cursive;
        font-size: 8px;
        padding: 4px 8px;
        margin-bottom: -4px;
        z-index: 10;
        text-transform: uppercase;
      }

      .thinking-dots {
        display: inline-block;
        animation: thinking 1s infinite;
      }

      @keyframes thinking {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    </style>
